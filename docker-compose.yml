services:

  production:
    # image: ghcr.io/presenton/presenton:latest
    build: .
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    container_name: presenton
    ports:
      # You can replace 5000 with any other port number of your choice to run Presenton on a different port number.
      - "5000:80"
    volumes:
      - ./app_data:/app_data
    environment:
      - IMAGE_PROVIDER=flux
      - FLUX_URL=http://imgen:8020/generate
      - CAN_CHANGE_KEYS=${CAN_CHANGE_KEYS}
      - LLM=${LLM}
      - OLLAMA_URL=${OLLAMA_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      # Comma-separated list of Ollama models available to users.
      # Only models that are actually pulled in Ollama will appear in the list.
      # If empty or not set — all pulled models are available.
      # Example: MODELS_FOR_USERS=gemma3:4b,qwen2.5:7b
      - MODELS_FOR_USERS=${MODELS_FOR_USERS}
      - EXTENDED_REASONING=${EXTENDED_REASONING}
      - TOOL_CALLS=${TOOL_CALLS}
      - DISABLE_THINKING=${DISABLE_THINKING}
      - DISABLE_IMAGE_GENERATION=${DISABLE_IMAGE_GENERATION}
      - DATABASE_URL=${DATABASE_URL}
      - DISABLE_ANONYMOUS_TRACKING=${DISABLE_ANONYMOUS_TRACKING}
      - COMFYUI_URL=${COMFYUI_URL}
      - COMFYUI_WORKFLOW=${COMFYUI_WORKFLOW}
